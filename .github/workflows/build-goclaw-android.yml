name: Build GoClaw Android Library

on:
  push:
    branches: [ main, tauri-v2, clawadmin, android ]
    paths:
      - 'src-tauri/goclaw-android/**'
      - '.github/workflows/build-goclaw-android.yml'
  workflow_dispatch:

jobs:
  build-goclaw-android:
    name: Build GoClaw Android Libraries
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b
          add-to-path: true

      - name: Build GoClaw for Android
        working-directory: ./src-tauri/goclaw-android
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          chmod +x build-android-rust.sh
          ./build-android-rust.sh

      - name: Verify libraries
        run: |
          echo "=== JNI Libraries ==="
          find src-tauri/gen/android/app/src/main/jniLibs -type f -name "*.so" 2>/dev/null || echo "No .so files found"
          ls -la src-tauri/gen/android/app/src/main/jniLibs/*/ 2>/dev/null || echo "jniLibs directory not found"

      - name: Upload GoClaw Libraries
        uses: actions/upload-artifact@v4
        with:
          name: goclaw-android-libraries
          path: |
            src-tauri/gen/android/app/src/main/jniLibs/
          retention-days: 30

      - name: Commit libraries to repository
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src-tauri/gen/android/app/src/main/jniLibs/
          git diff --staged --quiet || git commit -m "Update GoClaw Android libraries [skip ci]"
          git push || echo "Nothing to commit"
