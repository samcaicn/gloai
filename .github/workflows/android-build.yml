name: Build Android APK

on:
  push:
    branches: [ main, tauri-v2, clawadmin, android ]
  pull_request:
    branches: [ main, tauri-v2, clawadmin ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b
          add-to-path: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Build frontend
        run: npm run build

      - name: Initialize Tauri Android
        run: |
          cd src-tauri
          tauri android init --ci || echo "Android already initialized"
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Verify capabilities
        run: |
          echo "=== Checking capabilities ==="
          cat src-tauri/capabilities/default.json
          cat src-tauri/capabilities/android.json 2>/dev/null || echo "No android.json"
          ls -la src-tauri/capabilities/

      - name: Build Android APK
        run: |
          cd src-tauri
          tauri android build --debug
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Find APK files
        run: |
          echo "=== Looking for APK files ==="
          find src-tauri/gen/android -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo "=== Build outputs ==="
          ls -la src-tauri/gen/android/app/build/outputs/apk/ 2>/dev/null || echo "No outputs directory"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ggclaw-android-debug-apk
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Build Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-logs
          path: |
            src-tauri/gen/android/app/build/reports/
            ~/.gradle/daemon/
          retention-days: 7
