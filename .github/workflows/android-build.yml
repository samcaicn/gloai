name: Build Android APK

on:
  push:
    branches: [ main, tauri-v2, clawadmin, android ]
  pull_request:
    branches: [ main, tauri-v2, clawadmin ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Download Gradle Wrapper
        working-directory: ./src-tauri/gen/android
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar
          ls -la gradle/wrapper/

      - name: Make gradlew executable
        working-directory: ./src-tauri/gen/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: ./src-tauri/gen/android
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
        continue-on-error: true

      - name: Check build outputs
        working-directory: ./src-tauri/gen/android
        run: |
          echo "=== Build outputs ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo "=== Build directory ==="
          ls -la app/build/outputs/apk/ 2>/dev/null || echo "No outputs directory"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ggclaw-android-debug-apk
          path: |
            src-tauri/gen/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Build Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-reports
          path: |
            src-tauri/gen/android/app/build/reports/
            src-tauri/gen/android/build.log
          retention-days: 7
