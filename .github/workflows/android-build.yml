name: Build Android APK

on:
  push:
    branches: [ main, tauri-v2, clawadmin, android ]
  pull_request:
    branches: [ main, tauri-v2, clawadmin ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x src-tauri/gen/android/gradlew

      - name: Build APK with Gradle
        working-directory: ./src-tauri/gen/android
        run: ./gradlew assembleRelease

      - name: Sign APK (Debug)
        if: github.event_name == 'pull_request'
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY || '' }}
          alias: ${{ secrets.ALIAS || 'ggclaw' }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD || 'ggclaw123' }}
          keyPassword: ${{ secrets.KEY_PASSWORD || 'ggclaw123' }}
        continue-on-error: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ggclaw-android-apk
          path: |
            src-tauri/gen/android/app/build/outputs/apk/release/*.apk
            src-tauri/gen/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Build Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: src-tauri/gen/android/app/build/reports/
          retention-days: 7
