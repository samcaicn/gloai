name: Build ggai

on:
  push:
    branches: [ main, tauri-v2 ]
  pull_request:
    branches: [ main, tauri-v2 ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: universal-apple-darwin
            build_cmd: npm run build:mac
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build_cmd: npm run build:linux
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build_cmd: npx tauri build --target aarch64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            build_cmd: npm run build:win

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org/'

      - name: Configure npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Configure Cargo registry
        run: |
          echo '[source.crates-io]' > ~/.cargo/config.toml
          echo 'registry = "https://github.com/rust-lang/crates.io-index"' >> ~/.cargo/config.toml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target != 'universal-apple-darwin' && matrix.target || 'x86_64-apple-darwin,aarch64-apple-darwin' }}
          components: rustfmt, clippy

      - name: Install dependencies (Linux x86_64)
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config

      - name: Install dependencies (Linux ARM64)
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev:arm64 \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev:arm64 \
            libgtk-3-dev:arm64 \
            libayatana-appindicator3-dev:arm64 \
            librsvg2-dev:arm64 \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            pkg-config \
            libglib2.0-dev:arm64 \
            libgdk-pixbuf2.0-dev:arm64 \
            libcairo2-dev:arm64 \
            libpango1.0-dev:arm64 \
            libharfbuzz-dev:arm64 \
            libz-dev:arm64

      - name: Check for package-lock.json (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          ls -la
          ls -la package-lock.json

      - name: Check for package-lock.json (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          Get-ChildItem
          Get-ChildItem package-lock.json

      - name: Remove electronCompat.ts if exists (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          if [ -f "src/renderer/services/electronCompat.ts" ]; then
            rm src/renderer/services/electronCompat.ts
            echo "Removed electronCompat.ts"
          else
            echo "electronCompat.ts does not exist"
          fi

      - name: Remove electronCompat.ts if exists (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          if (Test-Path "src/renderer/services/electronCompat.ts") {
            Remove-Item "src/renderer/services/electronCompat.ts"
            Write-Output "Removed electronCompat.ts"
          } else {
            Write-Output "electronCompat.ts does not exist"
          }

      - name: Install dependencies
        run: npm install --package-lock-only

      - name: Install dependencies with ci
        run: npm ci

      - name: Install Rust targets (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Build
        run: ${{ matrix.build_cmd }}
        env:
          CI: true
          apiKey: ${{ secrets.apiKey || 'gk_981279d245764a1cb53738da' }}
          apiSecret: ${{ secrets.apiSecret || 'gs_7a8b9c0d1e2f3g4h5i6j7k8l9m0n1o2' }}
          PKG_CONFIG: pkg-config
          PKG_CONFIG_ALLOW_CROSS: '1'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ggai-${{ matrix.os }}-${{ matrix.target }}
          path: |
            src-tauri/target/*/release/bundle/dmg/*.dmg
            src-tauri/target/*/release/bundle/msi/*.msi
            src-tauri/target/*/release/bundle/appimage/*.AppImage
            src-tauri/target/*/release/bundle/deb/*.deb
          retention-days: 30
          if-no-files-found: warn
