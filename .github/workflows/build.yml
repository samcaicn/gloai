name: Build ggai

on:
  push:
    branches: [ tauri-v2, clawadmin ]
    paths-ignore:
      - 'src-tauri/gen/android/**'
      - 'src-tauri/goclaw-android/**'
      - '.github/workflows/android-build.yml'
      - '.github/workflows/build-goclaw-android.yml'
  pull_request:
    branches: [ tauri-v2, clawadmin ]
    paths-ignore:
      - 'src-tauri/gen/android/**'
      - 'src-tauri/goclaw-android/**'
      - '.github/workflows/android-build.yml'
      - '.github/workflows/build-goclaw-android.yml'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: universal-apple-darwin
            build_cmd: npm run build:mac
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build_cmd: npm run build:linux
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build_cmd: npx tauri build --target aarch64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            build_cmd: npm run build:win

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org/'

      - name: Configure npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Configure Cargo registry
        run: |
          echo '[source.crates-io]' > ~/.cargo/config.toml
          echo 'registry = "https://github.com/rust-lang/crates.io-index"' >> ~/.cargo/config.toml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target != 'universal-apple-darwin' && matrix.target || 'x86_64-apple-darwin,aarch64-apple-darwin' }}
          components: rustfmt, clippy

      - name: Install dependencies (Linux x86_64)
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies (Linux aarch64)
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install create-dmg
          brew install jq

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install jq -y

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: ${{ matrix.build_cmd }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ggai-${{ matrix.os }}-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload debug symbols (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ggai-windows-symbols
          path: src-tauri/target/${{ matrix.target }}/release/*.pdb
          retention-days: 30
          if-no-files-found: ignore
