name: Build GlobalClaw

on:
  push:
    branches: [ main, box ]
  pull_request:
    branches: [ main, box ]

jobs:
  build:
    name: Build on macOS
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: universal-apple-darwin
            build_cmd: npm run dist:mac:universal
          - target: x86_64-apple-darwin
            build_cmd: npm run dist:mac:x64
          - target: aarch64-apple-darwin
            build_cmd: npm run dist:mac:arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install --verbose
        env:
          npm_config_timeout: 600000
          npm_config_fetch_retry_mintimeout: 10000
          npm_config_fetch_retry_maxtimeout: 60000
        timeout-minutes: 20

      - name: Install web-search skill dependencies
        run: npm install --verbose
        working-directory: ./SKILLs/web-search
        env:
          npm_config_timeout: 600000
          npm_config_fetch_retry_mintimeout: 10000
          npm_config_fetch_retry_maxtimeout: 60000
        timeout-minutes: 10

      - name: Build
        run: ${{ matrix.build_cmd }}
        env:
          CI: true
          WIN_CSC_LINK: ""
          WIN_CSC_KEY_PASSWORD: ""

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: globalclaw-macos-${{ matrix.target }}
          path: |
            release/*
          retention-days: 30
          if-no-files-found: warn
