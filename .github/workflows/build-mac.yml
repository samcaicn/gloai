name: Build macOS

on:
  push:
    branches: [ec, main]
  pull_request:
    branches: [ec, main]

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          enable_pre_post: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm config set frozen-lockfile false && pnpm install

      - name: Build
        run: pnpm run build

      - name: Compile Electron
        run: pnpm run compile:electron

      - name: Build Skills
        run: pnpm run build:skills

      - name: Build macOS universal app
        run: pnpm run dist:mac:universal

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-universal
          path: release/*.dmg
