name: Build macOS

on:
  push:
    branches: [ec, main]
  pull_request:
    branches: [ec, main]

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          enable_pre_post: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm config set frozen-lockfile false && pnpm install

      - name: Build
        run: pnpm run build

      - name: Compile Electron
        run: pnpm run compile:electron

      - name: Build Skills
        run: pnpm run build:skills

      - name: Build macOS arm64
        run: |
          rm -rf release
          pnpm run dist:mac:arm64
          mkdir -p release-arm64
          mv release/*.dmg release-arm64/

      - name: Build macOS x64
        run: |
          rm -rf release
          pnpm run dist:mac:x64
          mkdir -p release-x64
          mv release/*.dmg release-x64/

      - name: Create Universal app
        run: |
          # Mount DMGs
          hdiutil attach release-arm64/*.dmg -mountpoint /tmp/arm64 -nobrowse
          hdiutil attach release-x64/*.dmg -mountpoint /tmp/x64 -nobrowse
          
          # Find .app
          ARM64_APP=$(find /tmp/arm64 -name "*.app" -type d | head -1)
          X64_APP=$(find /tmp/x64 -name "*.app" -type d | head -1)
          
          # Copy arm64 app and merge binaries
          cp -r "$ARM64_APP" /tmp/LobsterAI.app
          lipo -create "$ARM64_APP/Contents/MacOS/"* "$X64_APP/Contents/MacOS/"* -output /tmp/LobsterAI.app/Contents/MacOS/LobsterAI
          
          # Unmount
          hdiutil detach /tmp/arm64
          hdiutil detach /tmp/x64
          
          # Create DMG
          hdiutil create -volname LobsterAI -srcfolder /tmp/LobsterAI.app -ov -format UDZO release/LobsterAI-universal.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-universal
          path: release/*.dmg
