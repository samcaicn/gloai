name: Build macOS

on:
  push:
    branches: [ec, main]
  pull_request:
    branches: [ec, main]

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Compile Electron
        run: pnpm run compile:electron

      - name: Build Skills
        run: pnpm run build:skills

      - name: Build macOS app
        run: pnpm run dist:mac

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: release/*.dmg
