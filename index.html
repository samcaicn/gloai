<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GloAI</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <script>
      // 在页面加载前预设主题，避免闪烁
      (function() {
        try {
          const savedConfig = localStorage.getItem('app_config');
          if (savedConfig) {
            const config = JSON.parse(savedConfig);
            const theme = config.theme || 'system';
            
            if (theme === 'dark') {
              document.documentElement.classList.add('dark');
              document.documentElement.style.backgroundColor = '#0F1117';
            } else if (theme === 'light') {
              document.documentElement.classList.add('light');
              document.documentElement.style.backgroundColor = '#F8F9FB';
            } else {
              // 跟随系统
              const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
              if (prefersDark) {
                document.documentElement.classList.add('dark');
                document.documentElement.style.backgroundColor = '#0F1117';
              } else {
                document.documentElement.classList.add('light');
                document.documentElement.style.backgroundColor = '#F8F9FB';
              }
            }
          }
        } catch (e) {
          console.error('Error applying theme early:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div style="display: flex; align-items: center; justify-content: center; height: 100vh; background: #0F1117; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
        <div style="text-align: center;">
          <div style="width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, #7C3AED, #A855F7); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 32px;">G</div>
          <div style="font-size: 18px; margin-bottom: 8px;">Loading...</div>
          <div style="width: 96px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto; overflow: hidden;">
            <div id="loading-bar" style="width: 50%; height: 100%; background: #A855F7; border-radius: 2px; animation: shimmer 1.5s infinite;"></div>
          </div>
        </div>
      </div>
      <style>
        @keyframes shimmer {
          0% { transform: translateX(-100%); }
          100% { transform: translateX(200%); }
        }
      </style>
    </div>
    <script>
      // 清除加载指示器当React挂载完成
      window.__CLEAR_LOADING = function() {
        const root = document.getElementById('root');
        if (root) {
          root.innerHTML = '';
        }
      };
    </script>
    <script>
      // 检查 Tauri 是否已初始化
      window.__TAURI_CHECK_INTERVAL = setInterval(function() {
        // 检查多种Tauri初始化状态
        const isTauriReady = window.__TAURI_INTERNALS__ || 
                           window.__TAURI__ || 
                           window.isTauri || 
                           (window.electron && typeof window.electron === 'object') ||
                           window.tauri;
        
        if (isTauriReady) {
          console.log('[index.html] Tauri initialized!');
          clearInterval(window.__TAURI_CHECK_INTERVAL);
          // 确保清除间隔
          window.__TAURI_CHECK_INTERVAL = null;
        }
      }, 100);
      
      // 10秒后停止检查
      setTimeout(function() {
        if (window.__TAURI_CHECK_INTERVAL) {
          console.log('[index.html] Tauri initialization check timeout');
          clearInterval(window.__TAURI_CHECK_INTERVAL);
          window.__TAURI_CHECK_INTERVAL = null;
        }
      }, 10000);
    </script>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
